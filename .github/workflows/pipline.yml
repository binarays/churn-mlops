name: Full MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      # Configure DVC Remote (DAGsHub)
      - name: Configure DVC Remote
        run: |
          dvc remote add -f origin https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/churn-mlops.dvc
          dvc remote default origin
          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}

      # Run DVC Pipeline (Train models + generate files)
      - name: Run DVC Pipeline
        run: dvc repro

      # Push generated models/data to remote
      - name: Push DVC Artifacts
        run: dvc push

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t churn-api .