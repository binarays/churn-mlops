<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><circle cx='16' cy='16' r='16' fill='chartreuse'/></svg>">

    <link rel="stylesheet" href="static/css/style.css">

</head>

<body>

    <div class="container py-5">

        <div class="card shadow-lg main-card">

            <h1 class="title text-center">Customer Churn Predictor</h1>

            <div class="card-body">

                <form id="predictForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tenure (Months)</label>
                            <input type="number" class="form-control" id="tenure" placeholder="Enter tenure" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Monthly Charges</label>
                            <input type="number" class="form-control" id="monthlyCharges"
                                placeholder="Enter monthly charges" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Total Charges</label>
                            <input type="number" class="form-control" id="totalCharges"
                                placeholder="Enter total charges" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contract Type</label>
                            <select class="form-select" id="contract">
                                <option value="0">Month-to-Month</option>
                                <option value="1">One Year</option>
                                <option value="2">Two Year</option>
                            </select>
                        </div>

                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Prediction Result</label>
                        <div id="result" class="result-box mt-2">
                            <div id="loading" class="loading mt-4 text-center">
                                <div class="spinner-border custom-spinner" role="status"></div>
                                <p class="mt-2">Running ML Model...</p>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="predict-btn">Predict Now</button>
                        <button type="button" class="clear-btn" onclick="clearFields()">Clear</button>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="static/js/script.js"></script>
    <script src="static/js/control.js"></script>

</body>

</html>
