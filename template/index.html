<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Customer Churn Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="static/css/style.css">

</head>

<body>

    <div class="container py-5">

        <h1 class="title text-center">AI Customer Churn Predictor</h1>
        <p class="subtitle text-center">Predict whether a customer will churn using Machine Learning</p>

        <div class="card shadow-lg main-card">

            <div class="card-body">

                <form id="predictForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tenure (Months)</label>
                            <input type="number" class="form-control" id="tenure" placeholder="Enter tenure" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Monthly Charges</label>
                            <input type="number" class="form-control" id="monthlyCharges"
                                placeholder="Enter monthly charges" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Total Charges</label>
                            <input type="number" class="form-control" id="totalCharges"
                                placeholder="Enter total charges" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contract Type</label>
                            <select class="form-select" id="contract">
                                <option value="0">Month-to-Month</option>
                                <option value="1">One Year</option>
                                <option value="2">Two Year</option>
                            </select>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-primary w-100 predict-btn">
                        Predict Churn
                    </button>

                </form>

                <div id="loading" class="loading mt-4 text-center">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Running AI Model...</p>
                </div>

                <div id="result" class="result-box mt-4"></div>

            </div>

        </div>

    </div>

    <script src="static/js/script.js"></script>

</body>

</html>
